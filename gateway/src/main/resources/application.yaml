server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: request-service
            uri: http://request-service:8082
            predicates:
              - Path=/api/payment/**

          - id: settlement-service
            uri: http://settlement-service:8083
            predicates:
              - Path=/api/batch/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG